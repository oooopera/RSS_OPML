name: RSSHub Category Sync

on:
  schedule:
    - cron: '0 1 * * *' 
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync Script
        # 即使报错也会记录日志
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 尝试添加所有相关文件，如果文件不存在也不会报错
          git add data/categories/*.opml || true
          git add Route_List.txt || true
          
          # 2. 特别处理 new_route.txt，只在它存在时才 add
          if [ -f "new_route.txt" ]; then
            git add new_route.txt
          fi
          
          # 3. 检查是否有文件变化，如果有则提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update RSS and New Routes" && git push)