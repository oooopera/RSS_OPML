name: RSSHub Category Sync

on:
  schedule:
    - cron: '0 22 * * *' 
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync Script
        # 即使报错也会记录日志
        run: python main.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 检查目录是否存在且非空
          if [ -d "data/categories" ] && [ "$(ls -A data/categories)" ]; then
            git add data/categories/*.opml
            
            # 只有在确实有文件变动时才 Commit
            if ! git diff --staged --quiet; then
              git commit -m "Update Category OPMLs: $(date +%Y-%m-%d)"
              git push
            else
              echo "No significant changes detected."
            fi
          else
            echo "Error: No OPML files were generated."
            exit 1
          fi