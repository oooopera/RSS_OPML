name: RSSHub OPML Generator

on:
  schedule:
    - cron: '0 16 * * *'  # 北京时间每天 00:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 解决 Node 弃用警告

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install requests lxml

    - name: Run script
      run: python main.py
      env:
        # 注意：如果是调用搜索 API，建议在仓库 Settings > Secrets 中手动添加 GH_TOKENN
        # 如果只是普通操作，直接用内置的 GITHUB_TOKEN 即可
        GH_TOKEN: ${{ secrets.GH_TOKENN || secrets.GITHUB_TOKEN }}

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Commit and Push Results
      run: |
        # 详细日志文件全部加入提交
        git add rsshub_subscriptions.opml github_sources.log failed_nodes.log process_detail.log || true
        if ! git diff --cached --quiet; then
          git commit -m "🔄 自动更新订阅源 - $(date +'%Y-%m-%d')"
          git push
        else
          echo "No changes detected."
        fi
