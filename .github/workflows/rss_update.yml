name: RSSHub Category Sync

on:
  schedule:
    - cron: '0 22 * * *' # 北京时间早上 6 点
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      # 提前适配 Node.js 24，消除警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync Script
        run: python main.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 确保目录存在，防止 git add 报错
          if [ -d "data/categories" ]; then
            git add data/categories/*.opml
            
            # 只有在有变化时才提交，防止 exit 128
            if ! git diff --staged --quiet; then
              git commit -m "Update RSSHub categories: $(date +%Y-%m-%d)"
              git push
            else
              echo "No changes to commit."
            fi
          else
            echo "Error: Directory data/categories not found."
            exit 1
          fi