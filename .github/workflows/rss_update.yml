name: RSSHub Category Sync

on:
  schedule:
    - cron: '0 1 * * *' 
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync Script
        # 即使报错也会记录日志
        run: python main.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/categories/*.opml
          git add 路由清单.txt  # 明确添加根目录下的清单文件
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update RSS categories and Route List" && git push)