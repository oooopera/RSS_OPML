name: RSSHub OPML Auto Sync

on:
  schedule:
    - cron: '0 22 * * *' # 北京时间早上 6 点
  workflow_dispatch: # 支持手动运行

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync Script
        env:
          # 使用你配置的 Secret 提升 API 配额
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: python main.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 添加整个分类文件夹
          git add data/categories/*.opml
          # 如果有变化则提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Category OPMLs: $(date +%Y-%m-%d)" && git push)
