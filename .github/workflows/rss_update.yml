name: Update RSSHub OPML

on:
  schedule:
    - cron: '0 16 * * *' # 北京时间每天0点
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-opml:
    runs-on: ubuntu-latest
    env:
      # 提前适配 Node 24 避免弃用警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests lxml

      - name: Run Update Script
        run: python main.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@://github.com"
          git config --local user.name "github-actions[bot]"
          # 只有在文件有变动时才提交
          git add rsshub_subscriptions.opml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update OPML: $(date +'%Y-%m-%d')" && git push)
