name: Update RSSHub OPML

on:
  schedule:
    - cron: '0 16 * * *' # 北京时间每天0点
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-opml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests lxml

      - name: Run Update Script
        run: python main.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@://github.com"
          git config --local user.name "github-actions[bot]"
          git add rsshub_subscriptions.opml
          # 检查是否有变动，防止空提交报错
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update OPML: $(date +'%Y-%m-%d')"
            git push
          fi
